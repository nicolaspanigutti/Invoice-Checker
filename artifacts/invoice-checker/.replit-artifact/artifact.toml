kind = "web"
previewPath = "/"
title = "Invoice Checker"
version = "1.0.0"
id = "artifacts/invoice-checker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18333

[services.development]
run = "pnpm --filter @workspace/invoice-checker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/invoice-checker", "run", "build" ]
publicDir = "artifacts/invoice-checker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18333"
BASE_PATH = "/"
