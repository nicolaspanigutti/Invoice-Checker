kind = "web"
previewPath = "/"
title = "Invoice Checker"
version = "1.0.0"
id = "artifacts/invoice-checker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18333

[services.development]
run = "pnpm --filter @workspace/invoice-checker run dev"

[services.production]
publicDir = "artifacts/invoice-checker/dist/public"
serve = "static"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/invoice-checker", "run", "build"]

[services.production.build.env]
PORT = "18333"
BASE_PATH = "/"
NODE_ENV = "production"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18333"
BASE_PATH = "/"
