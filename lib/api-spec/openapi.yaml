openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Invoice Checker API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: lawFirms
    description: Law firm management
  - name: rates
    description: Panel rates management
  - name: users
    description: User management
  - name: invoices
    description: Invoice management
  - name: storage
    description: Object storage
  - name: rules
    description: Compliance rules management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      description: Authenticate with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      description: End the current session
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      description: Returns the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /law-firms:
    get:
      operationId: listLawFirms
      tags: [lawFirms]
      summary: List law firms
      description: Returns all law firms
      parameters:
        - name: includeInactive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of law firms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LawFirm"
    post:
      operationId: createLawFirm
      tags: [lawFirms]
      summary: Create law firm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLawFirmRequest"
      responses:
        "201":
          description: Law firm created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LawFirm"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /law-firms/{id}:
    get:
      operationId: getLawFirm
      tags: [lawFirms]
      summary: Get law firm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Law firm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LawFirmDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateLawFirm
      tags: [lawFirms]
      summary: Update law firm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLawFirmRequest"
      responses:
        "200":
          description: Updated law firm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LawFirm"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /law-firms/{id}/terms:
    get:
      operationId: getLawFirmTerms
      tags: [lawFirms]
      summary: Get firm terms
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Firm terms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FirmTerm"
    put:
      operationId: upsertLawFirmTerms
      tags: [lawFirms]
      summary: Upsert firm terms
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                terms:
                  type: array
                  items:
                    $ref: "#/components/schemas/UpsertTermItem"
              required:
                - terms
      responses:
        "200":
          description: Updated terms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FirmTerm"

  /panel-baseline-documents:
    get:
      operationId: listPanelBaselineDocuments
      tags: [rates]
      summary: List panel baseline documents
      parameters:
        - name: documentKind
          in: query
          schema:
            type: string
            enum: [rates, terms_conditions]
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PanelBaselineDocument"
    post:
      operationId: createPanelBaselineDocument
      tags: [rates]
      summary: Create panel baseline document with optional rates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePanelBaselineDocumentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PanelBaselineDocument"

  /panel-baseline-documents/{id}/status:
    patch:
      operationId: updatePanelBaselineDocumentStatus
      tags: [rates]
      summary: Update document status (verify, activate, archive)
      description: |
        Allowed status transitions:
        - draft → verified, archived
        - verified → active, archived
        - active → archived
        - archived → (none)
        Activating a document atomically archives any other active document of the same documentKind.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentStatusRequest"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PanelBaselineDocument"
        "400":
          description: Bad request (invalid status value)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Illegal status transition for the current document state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /panel-rates:
    get:
      operationId: listPanelRates
      tags: [rates]
      summary: List panel rates
      parameters:
        - name: documentId
          in: query
          schema:
            type: integer
        - name: firmName
          in: query
          schema:
            type: string
        - name: jurisdiction
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of rates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PanelRate"

  /panel-rates/lookup:
    get:
      operationId: lookupPanelRate
      tags: [rates]
      summary: Look up the active max rate for a given firm, jurisdiction, role, and currency
      parameters:
        - name: lawFirmName
          in: query
          required: true
          schema:
            type: string
        - name: jurisdiction
          in: query
          required: true
          schema:
            type: string
        - name: roleCode
          in: query
          required: true
          schema:
            type: string
        - name: currency
          in: query
          required: true
          schema:
            type: string
        - name: invoiceDate
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching rate or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PanelRateLookupResult"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      description: Super admin only
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuthUser"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user
      description: Super admin only
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user
      description: Super admin only
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices (paginated)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_review, escalated, disputed, accepted]
        - name: lawFirmId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated invoice list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResponse"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create a new invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update invoice header fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceRequest"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}/documents:
    get:
      operationId: listInvoiceDocuments
      tags: [invoices]
      summary: List documents for an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvoiceDocument"
    post:
      operationId: addInvoiceDocument
      tags: [invoices]
      summary: Add a document to an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddInvoiceDocumentRequest"
      responses:
        "201":
          description: Document added, extraction started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDocument"

  /invoices/{id}/items:
    get:
      operationId: listInvoiceItems
      tags: [invoices]
      summary: List line items for an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of line items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvoiceItem"

  /invoices/{id}/completeness:
    get:
      operationId: getInvoiceCompleteness
      tags: [invoices]
      summary: Check completeness gate for running analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Completeness check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletenessResult"

  /invoices/{id}/extract:
    post:
      operationId: extractInvoiceData
      tags: [invoices]
      summary: Trigger AI extraction for invoice documents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Extraction result with extracted fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionResult"

  /invoices/{id}/analyse:
    post:
      operationId: runInvoiceAnalysis
      tags: [invoices]
      summary: Run checking analysis (rule engine) on an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisRunResult"
        "404":
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Cannot run analysis — completeness gate failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}/analysis-runs:
    get:
      operationId: listAnalysisRuns
      tags: [invoices]
      summary: List analysis runs for an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis runs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalysisRun"

  /invoices/{id}/issues:
    get:
      operationId: listInvoiceIssues
      tags: [invoices]
      summary: List issues for an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: analysisRunId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Issues list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvoiceIssue"

  /invoices/{id}/issues/{issueId}/decide:
    post:
      operationId: decideIssue
      tags: [invoices]
      summary: Record a decision on an issue (accept / reject / delegate / return)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: issueId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecideIssueRequest"
      responses:
        "200":
          description: Decision recorded; returns updated issue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceIssue"
        "400":
          description: Invalid action or missing mandatory note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Role not permitted to take this action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invoice or issue not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}/comments:
    get:
      operationId: listInvoiceComments
      tags: [invoices]
      summary: List comments for an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: issueId
          in: query
          schema:
            type: integer
        - name: scope
          in: query
          schema:
            type: string
            enum: [general, issue_inline, line_inline, escalation, decision]
      responses:
        "200":
          description: Comments list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommentResponse"
    post:
      operationId: postInvoiceComment
      tags: [invoices]
      summary: Post a comment on an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostCommentRequest"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}/report:
    post:
      operationId: generateInvoiceReport
      tags: [invoices]
      summary: Generate structured review report with AI executive summary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceReport"
        "404":
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}/email-draft:
    post:
      operationId: generateEmailDraft
      tags: [invoices]
      summary: Generate AI email draft to disputed law firm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailDraft"
        "400":
          description: Invoice not in disputed state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}/rerun:
    post:
      operationId: rerunInvoiceAnalysis
      tags: [invoices]
      summary: Re-run analysis on an invoice (respects current rule activation state)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Re-run complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisRunResult"
        "422":
          description: Completeness gate failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rules:
    get:
      operationId: listRules
      tags: [rules]
      summary: List all compliance rules with their activation state
      responses:
        "200":
          description: List of rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rule"

  /rules/{code}:
    patch:
      operationId: updateRule
      tags: [rules]
      summary: Update a rule's activation state or configuration (super_admin only)
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isActive:
                  type: boolean
                configJson:
                  type: object
                  nullable: true
                reason:
                  type: string
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "404":
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}/audit-events:
    get:
      operationId: listInvoiceAuditEvents
      tags: [invoices]
      summary: List audit trail events for an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audit events list (chronological)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEventResponse"

components:
  schemas:
    RequestUploadUrlBody:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required:
        - name
        - size
        - contentType

    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
      required:
        - uploadURL
        - objectPath

    InvoiceListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceSummary"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required:
        - data
        - total
        - page
        - pageSize

    InvoiceSummary:
      type: object
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        lawFirmId:
          type: integer
        lawFirmName:
          type: string
          nullable: true
        documentType:
          type: string
          enum: [invoice, proforma]
        invoiceDate:
          type: string
          nullable: true
